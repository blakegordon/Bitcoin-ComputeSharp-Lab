name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the pipeline only when you push a tag like 'v1.0.0'

jobs:
  release:
    name: Build and Publish
    runs-on: windows-latest # Required for ComputeSharp / DX12 compilation

    permissions:
      contents: write # Required for the workflow to create a release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Single-File Executable
        run: >
          dotnet publish Miner/Miner.csproj 
          --configuration Release 
          --runtime win-x64 
          --self-contained true 
          -p:PublishSingleFile=true 
          --output ./publish_output

      - name: Zip the Output
        run: Compress-Archive -Path ./publish_output/* -DestinationPath ./Bitcoin-ComputeSharp-Lab-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./Bitcoin-ComputeSharp-Lab-win-x64.zip
          generate_release_notes: true
